<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <link rel="stylesheet" href="./pages/index.css">
  <link rel="icon" href="images/logo.svg">
  <title>Место</title>
</head>
<body class="body">
  <div class="page">
    <header class="header">
      <img class="header__logo" src="images/logo.svg" alt="Логотип">

    </header>

    <main class="content">

      <section class="profile">
        <button class="profile__avatar-button" type="button">
          <img class="profile__avatar-image" src="images/avatar.jpg" alt="Аватар">
        </button>

        <div class="profile__info">
          <h1 class="profile__info-title text-overflow">Жак-Ив Кусто</h1>
          <button class="profile__button profile__button_responsible_edit-info button-hovered" type="button"></button>
          <p class="profile__info-subtitle text-overflow">Исследователь океана</p>
        </div>

        <button class="profile__button profile__button_responsible_add-card button-hovered" type="button"></button>
      </section>

      <section class="gallery"></section>
    </main>

    <footer class="footer">
      <p class="footer__author">&copy; 2022 Mesto Russia</p>
    </footer>
  </div>

    <template id="gallery-template">
      <div class="gallery__card">
        <img class="gallery__img">
        <button class="gallery__trash-button" type="button"></button>

        <div class="gallery__description">
          <h2 class="gallery__title text-overflow"></h2>
          <button class="gallery__like-button" type="button"></button>
        </div>
      </div>
    </template>

    <template id="form-popup-template">
      <div class="popup form-popup">
        <div class="form-popup__container">
          <button class="button-close button-hovered" type="button"></button>
          <h2 class="form-popup__title"></h2>
          <form class="form-popup__form" action="#">
            <input class="form-popup__input" autocomplete="off" required>
            <input class="form-popup__input" autocomplete="off" required>
            <button class="form-popup__button-submit" type="submit"></button>
          </form>
        </div>
      </div>
    </template>

    <template id="image-popup-template">
      <div class="popup image-popup">
        <figure class="image-popup__container">
          <button class="button-close button-hovered" type="button"></button>
            <img class="image-popup__img">
            <figcaption class="image-popup__title"></figcaption>
        </figure>
      </div>
    </template>
  <script src="./scripts/index.js"></script>
</body>
</html>
