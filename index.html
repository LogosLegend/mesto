<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes, viewport-fit=cover">
  <link rel="stylesheet" href="./pages/index.css">
  <title>Место</title>
</head>
<body class="body">
  <div class="page">
    <header class="header">
      <img class="header__logo" src="images/logo.svg" alt="Логотип">

    </header>

    <main class="content">

      <section class="profile">
        <button class="profile__avatar-button" type="button">
          <img class="profile__avatar-image" src="images/avatar.jpg" alt="Аватар">
        </button>

        <div class="profile__info">
          <h1 class="profile__info-title text-overflow">Жак-Ив Кусто</h1>
          <button class="profile__info-button button-hovered" type="button"></button>
          <p class="profile__info-subtitle text-overflow">Исследователь океана</p>
        </div>

        <button class="profile__add-button button-hovered" type="button"></button>
      </section>

      <section class="gallery">

        <div class="gallery__card">
          <img class="gallery__img" src="images/karachevsk.jpg" alt="Карачаевск">

          <div class="gallery__description">
            <h2 class="gallery__title text-overflow">Карачаевск</h2>
            <button class="gallery__like-button" type="button"></button>
          </div>
        </div>

        <div class="gallery__card">
          <img class="gallery__img" src="images/elbrus.png" alt="Гора Эльбрус">
          
          <div class="gallery__description">
            <h2 class="gallery__title text-overflow">Гора Эльбрус</h2>
            <button class="gallery__like-button" type="button"></button>
          </div>
        </div>

        <div class="gallery__card">
          <img class="gallery__img" src="images/dombay.png" alt="Домбай">

          <div class="gallery__description">
            <h2 class="gallery__title text-overflow">Домбай</h2>
            <button class="gallery__like-button" type="button"></button>
          </div>
        </div>

        <div class="gallery__card">
          <img class="gallery__img" src="images/karachevsk.jpg" alt="Карачаево-Черкесия">

          <div class="gallery__description">
            <h2 class="gallery__title text-overflow">Карачаево-Черкесия</h2>
            <button class="gallery__like-button" type="button"></button>
          </div>
        </div>

        <div class="gallery__card">
          <img class="gallery__img" src="images/elbrus.png" alt="Гора Эльбрус">

          <div class="gallery__description">
            <h2 class="gallery__title text-overflow">Гора Эльбрус</h2>
            <button class="gallery__like-button" type="button"></button>
          </div>
        </div>

        <div class="gallery__card">
          <img class="gallery__img" src="images/dombay.png" alt="Домбай">

          <div class="gallery__description">
            <h2 class="gallery__title text-overflow">Домбай</h2>
            <button class="gallery__like-button" type="button"></button>
          </div>
        </div>
      </section>

    </main>

    <footer class="footer">
      <p class="footer__author">&copy; 2022 Mesto Russia</p>
    </footer>
  </div>

  <div class="popup">
      <div class="popup__container">
        <button class="popup__button-close button-hovered" type="button"></button>
        <h2 class="popup__title">Редактировать профиль</h2>
        <form class="popup__form" name="edit-profile-form" action="#">
          <input class="popup__input popup__input_name" name="name" value placeholder="Имя" autocomplete="off" required>
          <input class="popup__input popup__input_specialty" name="specialty" value placeholder="О себе" autocomplete="off" required>
          <button class="popup__button-submit" type="submit">Сохранить</button>
        </form>
      </div>
    </div>
  <script src="./scripts/script.js"></script>
</body>
</html>
